name: Update Weenie Wars

on:
  schedule:
    # Every 5 min — catches new weenie logs within 5 minutes
    - cron: '*/5 * * * *'
    # 8am ET (noon UTC) — guaranteed daily rebuild regardless of activity
    - cron: '0 12 * * *'
  push:
    branches: [main]
    paths:
      - last_seen.json   # CI commits this when new weenies detected → chains next run
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weenie-update
  cancel-in-progress: false  # let deploys finish; queue the next run

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json

      - name: Run update
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          # Set to 'true' only when triggered by the 8am ET daily schedule
          FORCE_REBUILD: ${{ github.event.schedule == '0 12 * * *' && 'true' || 'false' }}
        run: python weenie_wars_ci.py

name: Weenie Wars Auto-Update

on:
  schedule:
    # Every hour noon-10pm EDT (16:00-02:00 UTC), daily
    - cron: '0 16,17,18,19,20,21,22,23,0,1,2 * * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-key.json

      - name: Run update
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-key.json
        run: python weenie_wars_ci.py

      - name: Commit updated scores
        run: |
          git config user.email "actions@github.com"
          git config user.name "Weenie Wars Bot"
          git add build_weenie_wars_widget.py
          git diff --staged --quiet || git commit -m "Auto-update scores $(date +'%Y-%m-%d %H:%M' -u)"
          git push
